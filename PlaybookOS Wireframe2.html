<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PlaybookOS — Wireframe Prototype</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Helvetica, Arial, sans-serif; background: #f0f0f0; color: #111; height: 100vh; overflow: hidden; }
  #root { height: 100vh; display: flex; }

  /* Wireframe tokens */
  :root {
    --bg: #f4f4f4;
    --surface: #ffffff;
    --border: #cccccc;
    --border-dark: #999999;
    --text: #111111;
    --text-mid: #555555;
    --text-light: #888888;
    --accent: #222222;
    --tag-bg: #e8e8e8;
    --tag-border: #bbb;
    --sidebar-w: 200px;
  }

  /* Layout */
  .app { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
  .sidebar {
    width: var(--sidebar-w);
    background: #1e1e1e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    border-right: 2px solid #333;
    padding: 0;
  }
  .sidebar-logo {
    padding: 18px 16px 14px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    border-bottom: 1px solid #333;
    color: #fff;
    text-transform: uppercase;
  }
  .sidebar-logo span { font-weight: 300; color: #888; }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-section { padding: 4px 16px 2px; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 10px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    color: #aaa;
    border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .nav-item:hover { background: #2a2a2a; color: #fff; }
  .nav-item.active { background: #2e2e2e; color: #fff; border-left-color: #fff; }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .sidebar-footer { padding: 14px 16px; border-top: 1px solid #333; font-size: 12px; color: #555; }

  /* Main area */
  .main { flex: 1; overflow-y: auto; background: var(--bg); }
  .screen { min-height: 100%; }

  /* Screen header */
  .screen-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .screen-title { font-size: 20px; font-weight: 700; }
  .screen-subtitle { font-size: 13px; color: var(--text-mid); margin-top: 2px; }
  .screen-body { padding: 24px 28px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border: 1.5px solid var(--border-dark);
    background: var(--surface); color: var(--text);
    font-size: 13px; font-family: inherit; cursor: pointer;
    border-radius: 3px; font-weight: 500;
  }
  .btn:hover { background: #ebebeb; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #333; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: #ebebeb; border-color: var(--border); }

  /* Tags / chips */
  .chip {
    display: inline-block; padding: 3px 9px;
    background: var(--tag-bg); border: 1px solid var(--tag-border);
    border-radius: 2px; font-size: 12px; color: var(--text-mid);
  }
  .chip.active { background: #222; color: #fff; border-color: #222; }
  .status-chip {
    display: inline-block; padding: 2px 8px;
    border-radius: 2px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
    border: 1px solid;
  }
  .status-draft { background: #f0f0f0; color: #666; border-color: #ccc; }
  .status-reviewing { background: #e8e8e8; color: #444; border-color: #aaa; }
  .status-published { background: #222; color: #fff; border-color: #222; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; padding: 16px;
  }

  /* Table */
  .table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); }
  .table th {
    text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-mid);
    background: #f8f8f8; border-bottom: 1px solid var(--border);
  }
  .table td {
    padding: 12px 14px; font-size: 13px; border-bottom: 1px solid #ebebeb;
    vertical-align: middle;
  }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: #fafafa; }
  .table .link { color: #111; font-weight: 600; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  .table .link:hover { color: #444; }

  /* Form elements */
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
    font-size: 14px; font-family: inherit; border-radius: 3px; background: #fff;
    color: var(--text); outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #666; }
  .form-textarea { resize: vertical; min-height: 72px; }

  /* Progress bar */
  .progress-bar { height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #222; border-radius: 2px; transition: width 0.3s; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* Drag handle */
  .drag-handle { color: #bbb; font-size: 14px; cursor: grab; user-select: none; }

  /* Annotation box (wireframe callout) */
  .annotation {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: #888; font-style: italic;
    border: 1px dashed #ccc; padding: 3px 8px; border-radius: 2px;
    background: #fafafa;
  }

  /* Breadcrumb */
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-light); margin-bottom: 18px; }
  .breadcrumb-sep { color: #bbb; }
  .breadcrumb-link { cursor: pointer; color: var(--text-mid); }
  .breadcrumb-link:hover { text-decoration: underline; }

  /* Placeholder image box */
  .img-placeholder {
    background: repeating-linear-gradient(
      45deg, #ebebeb, #ebebeb 4px, #f4f4f4 4px, #f4f4f4 10px
    );
    border: 1.5px dashed #bbb; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    color: #999; font-size: 12px; font-style: italic; text-align: center;
  }

  /* Step indicator */
  .stepper { display: flex; align-items: center; gap: 0; margin-bottom: 24px; }
  .step {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-light); flex: 1;
  }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid #bbb; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    background: #fff; color: #999;
  }
  .step.done .step-num { background: #222; border-color: #222; color: #fff; }
  .step.active .step-num { border-color: #222; color: #222; }
  .step.active { color: #222; font-weight: 600; }
  .step-line { flex: 1; height: 1px; background: #ddd; margin: 0 4px; }
  .step.done .step-line { background: #555; }

  /* Lesson card styles */
  .lesson-card-wrap { max-width: 640px; margin: 0 auto; }
  .lesson-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 4px; padding: 28px 32px;
    min-height: 240px; position: relative;
  }
  .lesson-card-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-light); font-weight: 600; margin-bottom: 12px;
  }
  .lesson-card-title { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 12px; }
  .lesson-card-body { font-size: 15px; line-height: 1.65; color: var(--text-mid); }
  .lesson-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
  .quiz-option {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 3px; margin-bottom: 8px; cursor: pointer;
    font-size: 14px; background: #fff;
  }
  .quiz-option:hover { border-color: #888; background: #fafafa; }
  .quiz-option.selected { border-color: #222; background: #f0f0f0; }
  .quiz-option.correct { border-color: #444; background: #e8e8e8; }
  .quiz-option-key {
    width: 22px; height: 22px; border: 1.5px solid #bbb;
    border-radius: 2px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .quiz-option.selected .quiz-option-key { background: #222; color: #fff; border-color: #222; }
  .quiz-option.correct .quiz-option-key { background: #444; color: #fff; border-color: #444; }

  /* Two-col layout */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* Concept tag list */
  .concept-grid { display: flex; flex-wrap: wrap; gap: 6px; }

  /* Source list */
  .source-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border: 1px solid var(--border);
    background: #fff; border-radius: 3px; margin-bottom: 6px;
  }
  .source-icon {
    width: 28px; height: 28px; border: 1.5px solid #bbb;
    border-radius: 3px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #666; background: #f4f4f4;
    flex-shrink: 0;
  }

  /* Artifact list */
  .artifact-row {
    padding: 10px 14px; border-bottom: 1px solid #ebebeb;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
  }
  .artifact-row:hover { background: #f8f8f8; }
  .artifact-row.active { background: #f0f0f0; border-left: 2px solid #222; }

  /* Checklist */
  .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .check-box { width: 16px; height: 16px; border: 1.5px solid #bbb; border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .check-box.done { border-color: #444; background: #444; color: #fff; }

  /* Framework pillar */
  .pillar-card {
    border: 1.5px solid var(--border); border-radius: 3px;
    padding: 12px 14px; background: #fff;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .pillar-letter {
    width: 32px; height: 32px; border: 2px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; flex-shrink: 0; border-radius: 2px;
  }

  /* Publish output card */
  .output-card {
    border: 1.5px solid var(--border); border-radius: 3px;
    padding: 14px 16px; background: #fff; cursor: pointer;
    display: flex; flex-direction: column; gap: 6px;
  }
  .output-card:hover { border-color: #888; }
  .output-card.active { border-color: #222; }
  .output-card-label { font-size: 13px; font-weight: 600; }
  .output-card-sub { font-size: 12px; color: #888; }

  /* Analysis stage */
  .stage-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 3px; font-size: 13px;
  }
  .stage-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .stage-dot.done { background: #333; }
  .stage-dot.active { background: #888; border: 2px solid #333; }
  .stage-dot.waiting { background: #ddd; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>

<script type="text/babel">

        <div style={{fontSize:11,color:"#888",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:14}}>The Framework</div>
        <div style={{fontFamily:"monospace",fontWeight:900,fontSize:48,letterSpacing:"0.12em",marginBottom:18}}>A.G.E.N.T.</div>
        <div style={{maxWidth:820,margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
          {PILLARS.map((p,i)=>(
            <div key={i} style={{padding:"14px 10px",border:"1.5px solid #ccc",borderRadius:3,background:"#fff"}}>
              <div style={{fontSize:22,fontWeight:900,marginBottom:6}}>{p.letter}</div>
              <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{p.name}</div>
              <div style={{fontSize:11,color:"#777",lineHeight:1.5}}>{p.desc}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Module list */}
      <div style={{padding:"50px 40px",maxWidth:820,margin:"0 auto"}}>
        <div style={{fontSize:11,color:"#888",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:14}}>Curriculum</div>
        <div style={{fontSize:24,fontWeight:700,marginBottom:24}}>9 modules to build reliable agents</div>
        <div style={{display:"flex",flexDirection:"column",gap:0}}>
          {modules.map((m,i)=>(
            <div key={i} onClick={()=>onNav("lesson")} style={{padding:"18px 0",borderBottom:"1px solid #e0e0e0",display:"flex",alignItems:"center",gap:18,cursor:"pointer"}}>
              <div style={{fontFamily:"monospace",fontSize:14,color:"#aaa",width:28}}>{m.n}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:600}}>{m.title}</div>
                <div style={{fontSize:12,color:"#888",marginTop:3}}>{m.lessons} lessons · {m.time}</div>
              </div>
              <div style={{fontSize:14,color:"#bbb"}}>→</div>
            </div>
          ))}
        </div>
      </div>

      {/* Footer CTA */}
      <div style={{padding:"50px 40px",background:"#222",color:"#fff",textAlign:"center"}}>
        <div style={{fontSize:22,fontWeight:700,marginBottom:10}}>Ready to start building?</div>
        <div style={{fontSize:14,color:"#aaa",marginBottom:22}}>Free, self-paced, no signup required.</div>
        <button className="btn btn-primary" style={{padding:"10px 22px",fontSize:14,background:"#fff",color:"#222",borderColor:"#fff"}} onClick={()=>onNav("lesson")}>Start Module 1 →</button>
        <div style={{marginTop:30,fontSize:11,color:"#666"}}>Built with PlaybookOS</div>
      </div>
    </div>
  );
}

/* ─── WORKFLOW STEPPER ─── */
const WORKFLOW_STEPS = [
  { id: "library", label: "Library" },
  { id: "create", label: "New Playbook" },
  { id: "sources-add", label: "Sources" },
  { id: "analysis", label: "Analysis" },
  { id: "framework", label: "Framework" },
  { id: "outline", label: "Outline" },
  { id: "module", label: "Module" },
  { id: "lesson", label: "Lessons" },
  { id: "toolkit", label: "Toolkit" },
  { id: "publish", label: "Publish" },
  { id: "microsite", label: "Live Site" },
];

function WorkflowBar({ screen, onNav }) {
  const idx = WORKFLOW_STEPS.findIndex(s => s.id === screen);
  if (idx < 0) return null;
  return (
    <div style={{background:"#fff",borderBottom:"1px solid #e0e0e0",padding:"6px 20px",display:"flex",alignItems:"center",gap:0,overflowX:"auto"}}>
      {WORKFLOW_STEPS.map((s, i) => (
        <React.Fragment key={s.id}>
          <span
            onClick={()=>onNav(s.id)}
            style={{
              fontSize:"11px",fontWeight: i===idx?700:500,
              color: i < idx ? "#555" : i===idx ? "#111" : "#aaa",
              cursor:"pointer",whiteSpace:"nowrap",padding:"3px 2px",
              textDecoration: i < idx ? "underline" : "none",
              textUnderlineOffset:"2px"
            }}
          >{i+1}. {s.label}</span>
          {i < WORKFLOW_STEPS.length - 1 && <span style={{margin:"0 8px",color:"#ddd",fontSize:"11px"}}>›</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [screen, setScreen] = useState("library");

  const navMap = {
    "library": "library",
    "create": "playbooks",
    "sources": "sources-hub",
    "sources-add": "sources",
    "analysis": "playbooks",
    "framework": "frameworks",
    "frameworks": "frameworks",
    "outline": "playbooks",
    "module": "playbooks",
    "lesson": "playbooks",
    "toolkit": "toolkit",
    "publish": "publish",
    "microsite": "microsite",
    "empty": "empty",
    "settings": "settings",
  };

  const activeNav = navMap[screen] || screen;

  function handleNav(id) {
    setScreen(id);
  }

  function handleOpen(playbook) {
    setScreen("outline");
  }

  const workflowScreens = WORKFLOW_STEPS.map(s => s.id);
  const showWorkflow = workflowScreens.includes(screen);

  return (
    <div className="app">
      <Sidebar active={activeNav} onNav={(id) => {
        if (id === "library") setScreen("library");
        else if (id === "sources") setScreen("sources");
        else if (id === "frameworks") setScreen("frameworks");
        else if (id === "toolkit") setScreen("toolkit");
        else if (id === "publish") setScreen("publish");
        else if (id === "microsite") setScreen("microsite");
        else if (id === "empty") setScreen("empty");
        else if (id === "settings") setScreen("settings");
        else if (id === "playbooks") setScreen("outline");
        else setScreen(id);
      }} />
      <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
        {showWorkflow && <WorkflowBar screen={screen} onNav={handleNav} />}
        <div className="main">
          {screen === "library" && <Dashboard onNav={handleNav} onOpen={handleOpen} />}
          {screen === "create" && <CreatePlaybook onNav={handleNav} />}
          {screen === "sources" && <SourcesHub onNav={handleNav} />}
          {screen === "sources-add" && <AddSources onNav={handleNav} />}
          {screen === "analysis" && <SourceAnalysis onNav={handleNav} />}
          {screen === "framework" && <FrameworkBuilder onNav={handleNav} />}
          {screen === "frameworks" && <FrameworksLibrary onNav={handleNav} />}
          {screen === "outline" && <CourseOutline onNav={handleNav} />}
          {screen === "module" && <ModuleDetail onNav={handleNav} />}
          {screen === "lesson" && <LessonPlayer onNav={handleNav} />}
          {screen === "toolkit" && <Toolkit onNav={handleNav} />}
          {screen === "publish" && <Publish onNav={handleNav} />}
          {screen === "microsite" && <LearnerMicrosite onNav={handleNav} />}
          {screen === "empty" && <EmptyLibrary onNav={handleNav} />}
          {screen === "settings" && <PlaceholderScreen title="Settings" onNav={handleNav} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
